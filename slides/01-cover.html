
<!DOCTYPE html>

<style>
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: var(--font-body); }
.slide { width: var(--w); height: var(--h); padding: var(--pad-y) var(--pad-x); position: relative; overflow: hidden; }
.bg-gradient { position: absolute; inset: 0; background: radial-gradient(ellipse at 28% 22%, rgba(227, 24, 55, 0.14) 0%, transparent 48%), radial-gradient(ellipse at 85% 85%, rgba(242, 169, 0, 0.04) 0%, transparent 38%); }
.page-header { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 13px; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; position: relative; z-index: 1; }

.card { background: var(--paper); border: 1px solid var(--line-sub); padding: 40px 44px; border-radius: 16px; backdrop-filter: blur(12px); position: relative; z-index: 1; }
.card.accent { border-color: var(--line); }
.card-label { font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }
.card-title { font-family: var(--font-display); font-size: 30px; font-weight: 700; margin: 0 0 6px; }
.card-sub { font-size: 17px; color: var(--ink-muted); margin-bottom: 24px; }

.price span { font-size: 18px; color: var(--ink-muted); margin-left: 10px; }
ul.clean { list-style: none; padding: 0; margin: 0; }
ul.clean li { position: relative; padding-left: 22px; font-size: 18px; line-height: 1.7; color: var(--ink-muted); margin-bottom: 10px; }
ul.clean li::before { content: ""; position: absolute; left: 0; top: 11px; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
ul.clean li strong { color: var(--ink); font-weight: 600; }
.footnote { font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); line-height: 1.5; z-index: 1; position: relative; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; position: relative; z-index: 1; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; position: relative; z-index: 1; }
.metric { text-align: center; padding: 36px; background: var(--paper); border: 1px solid var(--line-sub); border-radius: 16px; }
.metric .num { font-family: var(--font-mono); font-size: 52px; font-weight: 500; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
.metric .label { font-size: 16px; color: var(--ink-muted); margin-top: 12px; }
.tag { display: inline-block; font-family: var(--font-mono); font-size: 12px; color: var(--accent); border: 1px solid var(--line); padding: 6px 12px; border-radius: 6px; margin-right: 8px; }
.verdict { font-family: var(--font-mono); font-size: 15px; color: var(--ink); border-left: 3px solid var(--accent); padding-left: 16px; margin-top: 16px; line-height: 1.6; }
.arrow-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--line), transparent); }
