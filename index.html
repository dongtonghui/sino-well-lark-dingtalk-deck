<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sino-Well 钉钉 or 飞书？数字化协同平台选型</title>
<style>
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0A0A0A; font-family: Inter, "PingFang SC", sans-serif; }
iframe { width: 100vw; height: 100vh; border: 0; }
#chrome { position: fixed; bottom: 24px; right: 32px; display: flex; gap: 12px; z-index: 100; }
#chrome button { background: rgba(227, 24, 55, 0.15); border: 1px solid rgba(227, 24, 55, 0.35); color: #F2F2F2; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: "JetBrains Mono", monospace; font-size: 13px; }
#chrome button:hover { background: rgba(227, 24, 55, 0.28); }
#counter { position: fixed; bottom: 24px; left: 32px; color: #4A4A4A; font-family: "JetBrains Mono", monospace; font-size: 13px; }
</style>
</head>
<body>
<iframe id="frame" src="slides/01-cover.html"></iframe>
<div id="counter">01 / 10</div>
<div id="chrome">
  <button id="prev">&#8592; Prev</button>
  <button id="next">Next &#8594;</button>
</div>
<script>
const MANIFEST = [
  { file: "slides/01-cover.html", label: "封面" },
  { file: "slides/02-status.html", label: "现状" },
  { file: "slides/03-problem.html", label: "核心问题" },
  { file: "slides/04-review.html", label: "三视角" },
  { file: "slides/05-conclusion.html", label: "结论" },
  { file: "slides/06-architecture.html", label: "架构" },
  { file: "slides/07-cost-risk.html", label: "成本风险" },
  { file: "slides/10-peers.html", label: "同行案例" },
  { file: "slides/08-plan.html", label: "行动计划" },
  { file: "slides/09-summary.html", label: "一页结论" }
];
let index = 0;
const frame = document.getElementById("frame");
const counter = document.getElementById("counter");
function update() {
  frame.src = MANIFEST[index].file;
  counter.textContent = String(index + 1).padStart(2, "0") + " / " + String(MANIFEST.length).padStart(2, "0");
}
document.getElementById("prev").addEventListener("click", () => { if (index > 0) { index--; update(); } });
document.getElementById("next").addEventListener("click", () => { if (index < MANIFEST.length - 1) { index++; update(); } });
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "ArrowDown") { if (index < MANIFEST.length - 1) { index++; update(); } }
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") { if (index > 0) { index--; update(); } }
});
</script>
</body>
</html>
